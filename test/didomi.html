<script type="text/javascript">
    (function () {
        var host = (location.hostname || "").toLowerCase();
        var seg = (location.pathname || "/").split("/").filter(Boolean);

        var ls = function (k) { try { return localStorage.getItem(k); } catch (e) { return null; } };

        var norm = function (v) {
            if (!v) return null;
            v = String(v).trim().replace("_", "-");
            if (/^zh-(cn|tw)$/i.test(v)) return v.toLowerCase() === "zh-cn" ? "zh-CN" : "zh-TW";
            if (/^[a-z]{2}$/i.test(v)) return v.toLowerCase();
            return null;
        };

        var fromPath = function () {
            return norm(seg[0]) || (seg[0] === "iberia" ? norm(seg[1]) : null);
        };

        var fromHbcLS = function () {
            try {
                var raw = ls("hbcAppLanguage");
                if (!raw) return null;
                var obj = JSON.parse(raw);
                return norm(obj && obj.state && obj.state.language);
            } catch (e) {
                return null;
            }
        };

        var lang =
            host === "partners.holafly.com"
                ? fromPath()
                : host === "brands.holafly.com"
                    ? (seg[0] === "iberia" ? (fromPath() || norm(ls("__tolgee_currentLanguage"))) : norm(ls("holaflylang")))
                    : host === "hbc.holafly.com"
                        ? fromHbcLS()
                        : null;

        // Global fallback chain + default "en"
        lang = lang || fromPath() || norm(ls("__tolgee_currentLanguage")) || norm(ls("holaflylang")) || fromHbcLS() || "en";

        window.didomiConfig = {
            languages: { enabled: [lang], default: lang },
            cookies: { storageSources: { cookies: true, localStorage: false } },

        };
        window.didomiEventListeners = window.didomiEventListeners || [];
        window.didomiEventListeners.push({
            event: 'notice.shown',
            listener: function () {
                var scrollbarWidth = window.innerWidth - document.documentElement.clientWidth;
                document.body.style.overflow = 'hidden';
                document.body.style.paddingRight = scrollbarWidth + 'px';
            }
        });

        window.didomiEventListeners.push({
            event: 'notice.hidden',
            listener: function () {
                document.body.style.overflow = '';
                document.body.style.paddingRight = '';
            }
        });
    })();

</script>
